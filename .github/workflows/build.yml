name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install customtkinter darkdetect
          pip install websocket-client python-dotenv requests pandas pyotp

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name BalfundEMABreakout `
            --icon=NONE `
            --hidden-import customtkinter `
            --hidden-import darkdetect `
            --collect-data customtkinter `
            --collect-data darkdetect `
            --hidden-import websocket `
            --hidden-import pyotp `
            app.py

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: BalfundEMABreakout-Windows
          path: dist/BalfundEMABreakout.exe
          retention-days: 30
